[mypy]
# mypy 配置文件

# Python 版本
python_version = 3.9

# 显示错误代码
show_error_codes = True

# 显示列号
show_column_numbers = True

# 严格模式
strict = True

# 警告配置
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True

# 第三方包类型检查
no_implicit_optional = True

# 排除的文件或目录
exclude =
    venv/
    env/
    .venv/
    build/
    dist/
    tests/
    .pytest_cache/

# 特定模块配置
[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-sqlalchemy.*]
ignore_missing_imports = True

[mypy-passlib.*]
ignore_missing_imports = True

[mypy-jose.*]
ignore_missing_imports = True

[mypy-supabase.*]
ignore_missing_imports = True

[mypy-loguru.*]
ignore_missing_imports = True
