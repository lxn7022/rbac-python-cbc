[settings]
# isort 配置文件

# 最大行长度
line_length = 100

# 多行导入格式
multi_line_output = 3

# 强制换行
force_grid_wrap = 0

# 使用括号
use_parentheses = true

# 对齐导入
include_trailing_comma = true

# 平行显示
lines_after_imports = 2

# 分隔标准库和第三方库
known_third_party = fastapi,pydantic,sqlalchemy,passlib,jose,supabase,loguru

# 排除的目录
skip = venv,env,.venv,build,dist,.git,.mypy_cache,.pytest_cache

# 跟径
known_local_folder = src
