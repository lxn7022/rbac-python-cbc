[tool.black]
# Black 代码格式化配置

# 最大行长度
line-length = 100

# 目标 Python 版本
target-version = ['py39', 'py310', 'py311']

# 排除的目录
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.pytest_cache
  | \.codebuddy
  | \.venv
  | venv
  | env
  | build
  | dist
  | \.eggs
)/
'''

# 包含的文件
include = '\.pyi?$'

# 扩展配置
skip-string-normalization = true
skip-magic-trailing-comma = true
